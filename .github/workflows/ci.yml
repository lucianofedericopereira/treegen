name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict type-check)
        run: mypy

      - name: Pytest
        run: pytest

  docs-fresh:
    name: Docs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dogfood the action against this repo, in check mode (never commits).
      - name: Verify README trees are current
        uses: ./
        with:
          readme: "README.md"
          check: "true"
          commit: "false"
      - name: Verify landing-page + docs trees are current
        uses: ./
        with:
          readme: |
            index.html
            docs.html
          format: "html"
          expand-placeholders: "false"
          check: "true"
          commit: "false"
